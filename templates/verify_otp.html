{% extends "base.html" %}
{% block title %}Verifikasi OTP — Socrow{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card" style="padding: 32px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="width: 64px; height: 64px; background: var(--accent-glow); color: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 16px;">
                <i class="fa fa-shield-check"></i>
            </div>
            <h1 style="font-family: var(--font-display); font-size: 22px; margin-bottom: 8px;">Verifikasi Keamanan</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">Masukkan 6-digit kode OTP yang dikirim ke email kamu.</p>
        </div>

        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <input type="text" name="otp" class="form-input" placeholder="000000" maxlength="6" autofocus required style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 800;">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Verifikasi & Masuk</button>
        </form>

        <div style="text-align: center; margin-top: 24px;">
            <p style="font-size: 13px; color: var(--text-muted);">
                Tidak menerima kode? <a href="/login" style="color: var(--accent-light); text-decoration: none;">Kirim ulang</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
